name: Sync Instagram Feed

on:
  schedule:
    - cron: '17 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: instagram-feed-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh Instagram feed
        run: npm run sync:instagram

      - name: Commit updated feed
        run: |
          if git diff --quiet -- src/data/instagram-feed.json public/instagram-feed; then
            echo "No Instagram changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/instagram-feed.json public/instagram-feed
          git commit -m "chore: sync Instagram feed"
          git push
